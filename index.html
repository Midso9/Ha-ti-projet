<!DOCTYPE html>
<html lang="fr">
<head>
<style id="ayiti-bg-fix">
/* ══════════════════════════════════════
   AYITI — BACKGROUND FIX DÉFINITIF
   Empêche le fond de passer par-dessus
   le contenu sur Android / mobile
══════════════════════════════════════ */

/* Tous les éléments de fond → derrière tout */
.bg, .bg-grid, .bg-wrap, .bg-ambiance,
.bg-layer, .bg-layer.active,
.bg-0,.bg-1,.bg-2,.bg-3,.bg-4,
.bg-glow, .left-bg, .left-glow,
.hero-bg, .hero-stripe, .hero-bg-color,
.hero-pattern, .hero-overlay, .hero-emoji-bg,
.bg-layer.bg-0, .bg-layer.bg-1,
.flag-stripe, .cta-pattern,
.cover-bg, .cover-pattern,
.gallery-pattern, .gallery-overlay,
.col-overlay, .feat-img-overlay,
.card-img-overlay, .r-overlay,
.gal-overlay, .map-bg-grid {
  z-index: -1 !important;
  pointer-events: none !important;
}

/* Body et html — fond de base garanti */
html, body {
  background-color: #0a0603 !important;
  position: relative !important;
  z-index: 0 !important;
}

/* Tout le contenu visible au-dessus */
body > * {
  position: relative !important;
  z-index: 1 !important;
}

/* Exceptions — éléments fixes qui doivent rester au-dessus */
nav, .topbar, .screen-nav {
  position: fixed !important;
  z-index: 200 !important;
}
.ayiti-bottom-nav {
  position: fixed !important;
  z-index: 998 !important;
}
.modal-overlay {
  position: fixed !important;
  z-index: 500 !important;
}
.toast {
  position: fixed !important;
  z-index: 9999 !important;
}
.autocomplete {
  position: absolute !important;
  z-index: 300 !important;
}
.three-dot-menu {
  position: absolute !important;
  z-index: 50 !important;
}

/* Contenu hero toujours visible */
.hero-left, .hero-content,
.hero-title, .hero-sub,
.hero-actions, .hero-stats,
.hero-eyebrow, .hero-badges,
.splash-logo, .splash-flag,
.splash-tagline, .splash-sub,
.splash-btn {
  position: relative !important;
  z-index: 5 !important;
  opacity: 1 !important;
}

/* Sections et layouts */
.page-layout, .layout, .page,
.main, .main-col, .main-content,
.content, .right, .right-panel,
.left, .left-panel, .sidebar,
.filters-panel, .conv-panel,
.chat-panel, section, footer,
.tab-content, .tab-page,
.screen, .form-section {
  position: relative !important;
  z-index: 2 !important;
}

/* Écrans onboarding */
.screen.active {
  position: fixed !important;
  z-index: 10 !important;
  opacity: 1 !important;
  transform: none !important;
}
/* ══ FIN BG FIX ══ */
</style>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYITI — La culture haïtienne, répertoriée</title>
<meta name="description" content="Restaurants, soirées, boutiques, événements — tout ce qui est 100% Haïti, réuni pour toi.">
<meta property="og:title" content="AYITI — La culture haïtienne, répertoriée">
<meta property="og:description" content="Découvrez les meilleurs lieux haïtiens partout dans le monde.">
<meta property="og:image" content="https://ayiti-app.vercel.app/og-image.png">
<meta name="theme-color" content="#C8102E">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0603;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;overflow:hidden}
  .splash{text-align:center;animation:fadeIn .8s ease both}
  @keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
  .logo{font-family:Georgia,serif;font-size:4rem;font-weight:900;color:#fff;letter-spacing:-.02em;margin-bottom:.5rem}
  .logo span{color:#F5A623}
  .flag{display:flex;width:48px;height:30px;border-radius:4px;overflow:hidden;margin:.8rem auto}
  .fb{flex:1;background:#00209F}.fr{flex:1;background:#C8102E}
  .tagline{color:rgba(249,243,232,.5);font-size:.9rem;margin-bottom:2rem}
  .bar{width:48px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin:0 auto}
  .bar-fill{height:100%;background:linear-gradient(90deg,#C8102E,#F5A623);border-radius:2px;animation:load 1.8s ease forwards}
  @keyframes load{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">AY<span>I</span>TI</div>
  <div class="flag"><div class="fb"></div><div class="fr"></div></div>
  <div class="tagline">La culture haïtienne, répertoriée.</div>
  <div class="bar"><div class="bar-fill"></div></div>
</div>
<script>
  // First visit → onboarding, return → landing
  const visited = localStorage.getItem('ayiti_visited');
  setTimeout(() => {
    if(!visited){
      localStorage.setItem('ayiti_visited','1');
      window.location.href = 'ayiti-onboarding.html';
    } else {
      window.location.href = 'ayiti-platform-landing.html';
    }
  }, 2000);
</script>
</body>
</html>
